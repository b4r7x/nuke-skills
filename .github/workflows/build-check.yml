name: build-check

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/build.mjs
      - run: test -z "$(git status --porcelain skills/)" || { git status --porcelain skills/; exit 1; }
